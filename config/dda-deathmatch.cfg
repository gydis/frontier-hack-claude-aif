# DDA Deathmatch Configuration
# Dynamic Difficulty Adjustment for human play

doom_scenario_path = deathmatch.wad
doom_skill = 3

# Rendering options
screen_resolution = RES_640X480
render_hud = true
render_crosshair = true
render_weapon = true

# Make episodes start in the first tic
episode_start_time = 1

# Episode timeout (will be overridden by wrapper based on difficulty)
episode_timeout = 4200

# Available buttons for human play
available_buttons =
    {
        ATTACK
        SPEED
        STRAFE
        MOVE_RIGHT
        MOVE_LEFT
        MOVE_BACKWARD
        MOVE_FORWARD
        TURN_RIGHT
        TURN_LEFT
        SELECT_WEAPON1
        SELECT_WEAPON2
        SELECT_WEAPON3
        SELECT_WEAPON4
        SELECT_WEAPON5
        SELECT_WEAPON6
        SELECT_NEXT_WEAPON
        SELECT_PREV_WEAPON
        LOOK_UP_DOWN_DELTA
        TURN_LEFT_RIGHT_DELTA
    }

# Game variables for stats tracking
available_game_variables =
    {
        HEALTH
        ARMOR
        KILLCOUNT
        DEATHCOUNT
        FRAGCOUNT
        DAMAGECOUNT
        DAMAGE_TAKEN
        HITCOUNT
        HITS_TAKEN
        SELECTED_WEAPON_AMMO
        POSITION_X
        POSITION_Y
        VELOCITY_X
        VELOCITY_Y
    }

# SPECTATOR mode allows human keyboard control
mode = SPECTATOR
